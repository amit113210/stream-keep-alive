name: Release APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Check signing secrets availability
        id: signing
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ] && \
             [ -n "${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}" ] && \
             [ -n "${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}" ] && \
             [ -n "${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}" ]; then
            echo "has_signing=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_signing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decode keystore
        if: steps.signing.outputs.has_signing == 'true'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > /tmp/release.keystore

      - name: Build signed release APK
        if: steps.signing.outputs.has_signing == 'true'
        env:
          ANDROID_SIGNING_STORE_FILE: /tmp/release.keystore
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Build debug APK fallback
        if: steps.signing.outputs.has_signing != 'true'
        run: ./gradlew assembleDebug --no-daemon

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if [ "${{ steps.signing.outputs.has_signing }}" = "true" ]; then
            SOURCE_APK="app/build/outputs/apk/release/app-release.apk"
          else
            SOURCE_APK="app/build/outputs/apk/debug/app-debug.apk"
          fi

          cp "$SOURCE_APK" "StreamKeepAlive-v${VERSION}.apk"
          cp "$SOURCE_APK" "StreamKeepAlive.apk"
          sha256sum "StreamKeepAlive-v${VERSION}.apk" | awk '{print $1}' > "StreamKeepAlive-v${VERSION}.apk.sha256"
          sha256sum "StreamKeepAlive.apk" | awk '{print $1}' > "StreamKeepAlive.apk.sha256"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            StreamKeepAlive-v*.apk
            StreamKeepAlive.apk
            StreamKeepAlive-v*.apk.sha256
            StreamKeepAlive.apk.sha256
          generate_release_notes: true
